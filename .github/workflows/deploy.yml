name: Deploy to AWS

on:
  workflow_dispatch:
    inputs:
      deployment_environment:
        description: Select the AWS account configuration
        required: true
        type: choice
        options:
          - client-production
          - source-rollback
      operation:
        description: Run a read-only diff or deploy the reviewed change
        required: true
        type: choice
        options:
          - DIFF
          - DEPLOY
      confirmation:
        description: Type the selected operation exactly (DIFF or DEPLOY)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.deployment_environment }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ inputs.confirmation == inputs.operation }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.deployment_environment }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      EXPECTED_AWS_ACCOUNT_ID: ${{ vars.EXPECTED_AWS_ACCOUNT_ID }}
      SYNC_ENABLED: ${{ vars.SYNC_ENABLED }}
      SCHEDULE_EXPRESSION: ${{ vars.SCHEDULE_EXPRESSION }}
      SCHEDULE_TIMEZONE: ${{ vars.SCHEDULE_TIMEZONE }}
      PIPELINE_STACK_NAME: ${{ secrets.PIPELINE_STACK_NAME }}
      BUDGET_STACK_NAME: ${{ secrets.BUDGET_STACK_NAME }}
      BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      FUNCTION_NAME: ${{ secrets.FUNCTION_NAME }}
      SCHEDULE_NAME: ${{ secrets.SCHEDULE_NAME }}
      ADMIN_API_NAME: ${{ secrets.ADMIN_API_NAME }}
      ADMIN_FUNCTION_NAME: ${{ secrets.ADMIN_FUNCTION_NAME }}
      BUDGET_NAME: ${{ secrets.BUDGET_NAME }}
      BUDGET_GUARD_FUNCTION_NAME: ${{ secrets.BUDGET_GUARD_FUNCTION_NAME }}
      BUDGET_GUARD_MONTHLY_SCHEDULE_NAME: ${{ secrets.BUDGET_GUARD_MONTHLY_SCHEDULE_NAME }}
      BUDGET_GUARD_HOURLY_SCHEDULE_NAME: ${{ secrets.BUDGET_GUARD_HOURLY_SCHEDULE_NAME }}
      # COMARCH_XML_URL remains accepted as a legacy secret fallback.
      XML_URL: ${{ secrets.XML_URL || secrets.COMARCH_XML_URL }}
      BL_API_TOKEN: ${{ secrets.BL_API_TOKEN }}
      BL_API_TOKEN_SSM_PARAM: ${{ secrets.BL_API_TOKEN_SSM_PARAM }}
      BL_SYNC_STATUS_SSM_PARAM: ${{ secrets.BL_SYNC_STATUS_SSM_PARAM }}
      BL_SYNC_CONFIG_SSM_PARAM: ${{ secrets.BL_SYNC_CONFIG_SSM_PARAM }}
      BUDGET_FX_RATE_SSM_PARAM: ${{ secrets.BUDGET_FX_RATE_SSM_PARAM }}
      BUDGET_GUARD_STATUS_SSM_PARAM: ${{ secrets.BUDGET_GUARD_STATUS_SSM_PARAM }}
      BL_INVENTORY_ID: ${{ secrets.BL_INVENTORY_ID }}
      BL_WAREHOUSE_ID: ${{ secrets.BL_WAREHOUSE_ID }}
      BL_API_MAX_RPM: ${{ secrets.BL_API_MAX_RPM }}
      MAKE_PUBLIC_FEED: ${{ secrets.MAKE_PUBLIC_FEED }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_PASSWORD_SHA256: ${{ secrets.ADMIN_PASSWORD_SHA256 }}
      CLIENT_BRAND_NAME: ${{ secrets.CLIENT_BRAND_NAME }}
      CLIENT_PANEL_TITLE: ${{ secrets.CLIENT_PANEL_TITLE }}
      CLIENT_PANEL_SUBTITLE: ${{ secrets.CLIENT_PANEL_SUBTITLE }}
      CLIENT_LOCALE: ${{ secrets.CLIENT_LOCALE }}
      CLIENT_PRIMARY_COLOR: ${{ secrets.CLIENT_PRIMARY_COLOR }}
      CLIENT_PRIMARY_DARK_COLOR: ${{ secrets.CLIENT_PRIMARY_DARK_COLOR }}
      CLIENT_SECONDARY_COLOR: ${{ secrets.CLIENT_SECONDARY_COLOR }}
      CLIENT_LOGO_BASE64: ${{ secrets.CLIENT_LOGO_BASE64 }}
      BUDGET_ALERT_EMAIL: ${{ secrets.BUDGET_ALERT_EMAIL }}
      BUDGET_LIMIT_USD: ${{ secrets.BUDGET_LIMIT_USD }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt -r cdk_app/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: repository-deployment
          role-duration-seconds: 3600
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION }}

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -eu
          for name in AWS_REGION EXPECTED_AWS_ACCOUNT_ID XML_URL \
            BL_INVENTORY_ID BL_WAREHOUSE_ID ADMIN_USERNAME BUCKET_NAME; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done

          if [ -z "${ADMIN_PASSWORD:-}" ] && [ -z "${ADMIN_PASSWORD_SHA256:-}" ]; then
            echo "::error::ADMIN_PASSWORD or ADMIN_PASSWORD_SHA256 is required"
            exit 1
          fi

          if [ "${{ inputs.operation }}" = "DEPLOY" ] && [ -z "${BL_API_TOKEN:-}" ]; then
            echo "::error::BL_API_TOKEN is not configured"
            exit 1
          fi

      - name: Prepare deployment values
        shell: bash
        run: |
          set -eu
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          if [ "$ACCOUNT_ID" != "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::error::AWS credentials do not match the selected environment"
            exit 1
          fi

          SYNC_ENABLED_VALUE="${SYNC_ENABLED:-false}"
          if [ "$SYNC_ENABLED_VALUE" != "true" ] && [ "$SYNC_ENABLED_VALUE" != "false" ]; then
            echo "::error::SYNC_ENABLED must be true or false"
            exit 1
          fi
          SCHEDULE_EXPRESSION_VALUE="${SCHEDULE_EXPRESSION:-cron(0 0,12,17 * * ? *)}"
          SCHEDULE_TIMEZONE_VALUE="${SCHEDULE_TIMEZONE:-Europe/Warsaw}"
          TOKEN_PARAM="${BL_API_TOKEN_SSM_PARAM:-/comarch-baselinker-sync/api-token}"
          STATUS_PARAM="${BL_SYNC_STATUS_SSM_PARAM:-/comarch-baselinker-sync/push-sync-status}"
          CONFIG_PARAM="${BL_SYNC_CONFIG_SSM_PARAM:-/comarch-baselinker-sync/sync-config}"
          FX_PARAM="${BUDGET_FX_RATE_SSM_PARAM:-/comarch-baselinker-sync/usd-pln-rate}"
          GUARD_PARAM="${BUDGET_GUARD_STATUS_SSM_PARAM:-/comarch-baselinker-sync/budget-guard-status}"
          RPM="${BL_API_MAX_RPM:-90}"
          LIMIT="${BUDGET_LIMIT_USD:-30}"
          PUBLIC_FEED="${MAKE_PUBLIC_FEED:-false}"
          BRAND_NAME="${CLIENT_BRAND_NAME:-XML → BaseLinker Sync}"
          PANEL_TITLE="${CLIENT_PANEL_TITLE:-Product synchronization}"
          PANEL_SUBTITLE="${CLIENT_PANEL_SUBTITLE:-Status and manual product synchronization}"
          LOCALE="${CLIENT_LOCALE:-en}"
          if [ "$LOCALE" != "en" ] && [ "$LOCALE" != "pl" ]; then
            echo "::error::CLIENT_LOCALE must be en or pl"
            exit 1
          fi
          PRIMARY_COLOR="${CLIENT_PRIMARY_COLOR:-#1673b8}"
          PRIMARY_DARK_COLOR="${CLIENT_PRIMARY_DARK_COLOR:-#0f5d96}"
          SECONDARY_COLOR="${CLIENT_SECONDARY_COLOR:-#183c5c}"
          if [ -n "${ADMIN_PASSWORD_SHA256:-}" ]; then
            if ! [[ "$ADMIN_PASSWORD_SHA256" =~ ^[a-fA-F0-9]{64}$ ]]; then
              echo "::error::ADMIN_PASSWORD_SHA256 must be a 64-character SHA-256 hash"
              exit 1
            fi
            PASSWORD_HASH="${ADMIN_PASSWORD_SHA256,,}"
          else
            PASSWORD_HASH="$(python -c 'import hashlib,os; print(hashlib.sha256(os.environ["ADMIN_PASSWORD"].encode()).hexdigest())')"
          fi
          EFFECTIVE_BUCKET_NAME="${BUCKET_NAME:-comarch-baselinker-sync-${ACCOUNT_ID}-${AWS_REGION}}"
          for value in "$BRAND_NAME" "$PANEL_TITLE" "$PANEL_SUBTITLE" \
            "$PRIMARY_COLOR" "$PRIMARY_DARK_COLOR" "$SECONDARY_COLOR"; do
            echo "::add-mask::$value"
          done
          {
            echo "AWS_ACCOUNT_ID=$ACCOUNT_ID"
            echo "SYNC_ENABLED_EFFECTIVE=$SYNC_ENABLED_VALUE"
            echo "SCHEDULE_EXPRESSION_EFFECTIVE=$SCHEDULE_EXPRESSION_VALUE"
            echo "SCHEDULE_TIMEZONE_EFFECTIVE=$SCHEDULE_TIMEZONE_VALUE"
            echo "PIPELINE_STACK_NAME_EFFECTIVE=${PIPELINE_STACK_NAME:-ComarchBaseLinkerSyncStack}"
            echo "BUDGET_STACK_NAME_EFFECTIVE=${BUDGET_STACK_NAME:-ComarchBaseLinkerBudgetStack}"
            echo "BUCKET_NAME_EFFECTIVE=$EFFECTIVE_BUCKET_NAME"
            echo "FUNCTION_NAME_EFFECTIVE=${FUNCTION_NAME:-comarch-baselinker-sync}"
            echo "SCHEDULE_NAME_EFFECTIVE=${SCHEDULE_NAME:-comarch-baselinker-sync-midnight}"
            echo "ADMIN_API_NAME_EFFECTIVE=${ADMIN_API_NAME:-comarch-baselinker-sync-admin-api}"
            echo "ADMIN_FUNCTION_NAME_EFFECTIVE=${ADMIN_FUNCTION_NAME:-comarch-baselinker-sync-admin}"
            echo "BUDGET_NAME_EFFECTIVE=${BUDGET_NAME:-comarch-baselinker-sync-monthly-budget}"
            echo "BUDGET_GUARD_FUNCTION_NAME_EFFECTIVE=${BUDGET_GUARD_FUNCTION_NAME:-comarch-baselinker-budget-guard}"
            echo "BUDGET_GUARD_MONTHLY_SCHEDULE_NAME_EFFECTIVE=${BUDGET_GUARD_MONTHLY_SCHEDULE_NAME:-comarch-baselinker-budget-guard-monthly-enable}"
            echo "BUDGET_GUARD_HOURLY_SCHEDULE_NAME_EFFECTIVE=${BUDGET_GUARD_HOURLY_SCHEDULE_NAME:-comarch-baselinker-budget-guard-hourly-check}"
            echo "BL_API_TOKEN_SSM_PARAM_EFFECTIVE=$TOKEN_PARAM"
            echo "BL_SYNC_STATUS_SSM_PARAM_EFFECTIVE=$STATUS_PARAM"
            echo "BL_SYNC_CONFIG_SSM_PARAM_EFFECTIVE=$CONFIG_PARAM"
            echo "BUDGET_FX_RATE_SSM_PARAM_EFFECTIVE=$FX_PARAM"
            echo "BUDGET_GUARD_STATUS_SSM_PARAM_EFFECTIVE=$GUARD_PARAM"
            echo "BL_API_MAX_RPM_EFFECTIVE=$RPM"
            echo "MAKE_PUBLIC_FEED_EFFECTIVE=$PUBLIC_FEED"
            echo "BUDGET_LIMIT_USD_EFFECTIVE=$LIMIT"
            echo "ADMIN_PASSWORD_HASH=$PASSWORD_HASH"
            echo "CLIENT_BRAND_NAME_EFFECTIVE=$BRAND_NAME"
            echo "CLIENT_PANEL_TITLE_EFFECTIVE=$PANEL_TITLE"
            echo "CLIENT_PANEL_SUBTITLE_EFFECTIVE=$PANEL_SUBTITLE"
            echo "CLIENT_LOCALE_EFFECTIVE=$LOCALE"
            echo "CLIENT_PRIMARY_COLOR_EFFECTIVE=$PRIMARY_COLOR"
            echo "CLIENT_PRIMARY_DARK_COLOR_EFFECTIVE=$PRIMARY_DARK_COLOR"
            echo "CLIENT_SECONDARY_COLOR_EFFECTIVE=$SECONDARY_COLOR"
          } >> "$GITHUB_ENV"

      - name: Restore private client logo
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ.get("CLIENT_LOGO_BASE64", "").strip()
          output = Path("admin_src/client-logo.png")
          if not raw:
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
                  env.write("CLIENT_LOGO_ENABLED=false\n")
              raise SystemExit(0)

          payload = base64.b64decode(raw, validate=True)
          if not payload.startswith(b"\x89PNG\r\n\x1a\n"):
              raise SystemExit("CLIENT_LOGO_BASE64 must contain a PNG image.")
          if len(payload) > 1024 * 1024:
              raise SystemExit("Client logo exceeds the 1 MB safety limit.")

          output.write_bytes(payload)
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write("CLIENT_LOGO_ENABLED=true\n")
          PY

      - name: Store BaseLinker token in SSM
        if: ${{ inputs.operation == 'DEPLOY' }}
        shell: bash
        run: |
          aws ssm put-parameter \
            --name "$BL_API_TOKEN_SSM_PARAM_EFFECTIVE" \
            --type SecureString \
            --value "$BL_API_TOKEN" \
            --overwrite >/dev/null

      - name: Bootstrap CDK
        if: ${{ inputs.operation == 'DEPLOY' }}
        working-directory: cdk_app
        shell: bash
        run: |
          budget_region="us-east-1"
          bootstrap_regions=("$AWS_REGION")
          if [ "$AWS_REGION" != "$budget_region" ]; then
            bootstrap_regions+=("$budget_region")
          fi

          for bootstrap_region in "${bootstrap_regions[@]}"; do
            npx --yes aws-cdk@2 bootstrap "aws://${AWS_ACCOUNT_ID}/${bootstrap_region}" \
              -c account="$AWS_ACCOUNT_ID" \
              -c region="$AWS_REGION" \
              -c xmlUrl="$XML_URL" \
              -c bucketName="$BUCKET_NAME_EFFECTIVE" \
              -c syncEnabled="$SYNC_ENABLED_EFFECTIVE" \
              -c blInventoryId="$BL_INVENTORY_ID" \
              -c blWarehouseId="$BL_WAREHOUSE_ID" \
              -c adminPasswordHash="$ADMIN_PASSWORD_HASH"
          done

      - name: Show infrastructure diff
        working-directory: cdk_app
        shell: bash
        run: |
          npx --yes aws-cdk@2 diff \
            "$PIPELINE_STACK_NAME_EFFECTIVE" \
            "$BUDGET_STACK_NAME_EFFECTIVE" \
            --change-set=false \
            -c account="$AWS_ACCOUNT_ID" \
            -c region="$AWS_REGION" \
            -c pipelineStackName="$PIPELINE_STACK_NAME_EFFECTIVE" \
            -c budgetStackName="$BUDGET_STACK_NAME_EFFECTIVE" \
            -c xmlUrl="$XML_URL" \
            -c bucketName="$BUCKET_NAME_EFFECTIVE" \
            -c functionName="$FUNCTION_NAME_EFFECTIVE" \
            -c scheduleName="$SCHEDULE_NAME_EFFECTIVE" \
            -c scheduleExpression="$SCHEDULE_EXPRESSION_EFFECTIVE" \
            -c scheduleTimezone="$SCHEDULE_TIMEZONE_EFFECTIVE" \
            -c syncEnabled="$SYNC_ENABLED_EFFECTIVE" \
            -c adminApiName="$ADMIN_API_NAME_EFFECTIVE" \
            -c adminFunctionName="$ADMIN_FUNCTION_NAME_EFFECTIVE" \
            -c budgetName="$BUDGET_NAME_EFFECTIVE" \
            -c budgetGuardFunctionName="$BUDGET_GUARD_FUNCTION_NAME_EFFECTIVE" \
            -c budgetGuardMonthlyScheduleName="$BUDGET_GUARD_MONTHLY_SCHEDULE_NAME_EFFECTIVE" \
            -c budgetGuardHourlyScheduleName="$BUDGET_GUARD_HOURLY_SCHEDULE_NAME_EFFECTIVE" \
            -c blApiTokenSsmParam="$BL_API_TOKEN_SSM_PARAM_EFFECTIVE" \
            -c blSyncStatusSsmParam="$BL_SYNC_STATUS_SSM_PARAM_EFFECTIVE" \
            -c blSyncConfigSsmParam="$BL_SYNC_CONFIG_SSM_PARAM_EFFECTIVE" \
            -c budgetFxRateSsmParam="$BUDGET_FX_RATE_SSM_PARAM_EFFECTIVE" \
            -c budgetGuardStatusSsmParam="$BUDGET_GUARD_STATUS_SSM_PARAM_EFFECTIVE" \
            -c blInventoryId="$BL_INVENTORY_ID" \
            -c blWarehouseId="$BL_WAREHOUSE_ID" \
            -c blApiMaxRpm="$BL_API_MAX_RPM_EFFECTIVE" \
            -c makePublicFeed="$MAKE_PUBLIC_FEED_EFFECTIVE" \
            -c adminUsername="$ADMIN_USERNAME" \
            -c adminPasswordHash="$ADMIN_PASSWORD_HASH" \
            -c brandName="$CLIENT_BRAND_NAME_EFFECTIVE" \
            -c brandPanelTitle="$CLIENT_PANEL_TITLE_EFFECTIVE" \
            -c brandPanelSubtitle="$CLIENT_PANEL_SUBTITLE_EFFECTIVE" \
            -c brandLocale="$CLIENT_LOCALE_EFFECTIVE" \
            -c brandPrimaryColor="$CLIENT_PRIMARY_COLOR_EFFECTIVE" \
            -c brandPrimaryDarkColor="$CLIENT_PRIMARY_DARK_COLOR_EFFECTIVE" \
            -c brandSecondaryColor="$CLIENT_SECONDARY_COLOR_EFFECTIVE" \
            -c brandLogoEnabled="$CLIENT_LOGO_ENABLED" \
            -c budgetAlertEmail="${BUDGET_ALERT_EMAIL:-}" \
            -c budgetLimitUsd="$BUDGET_LIMIT_USD_EFFECTIVE"

      - name: Deploy reviewed infrastructure
        if: ${{ inputs.operation == 'DEPLOY' }}
        working-directory: cdk_app
        shell: bash
        run: |
          npx --yes aws-cdk@2 deploy \
            "$PIPELINE_STACK_NAME_EFFECTIVE" \
            "$BUDGET_STACK_NAME_EFFECTIVE" \
            --require-approval never \
            -c account="$AWS_ACCOUNT_ID" \
            -c region="$AWS_REGION" \
            -c pipelineStackName="$PIPELINE_STACK_NAME_EFFECTIVE" \
            -c budgetStackName="$BUDGET_STACK_NAME_EFFECTIVE" \
            -c xmlUrl="$XML_URL" \
            -c bucketName="$BUCKET_NAME_EFFECTIVE" \
            -c functionName="$FUNCTION_NAME_EFFECTIVE" \
            -c scheduleName="$SCHEDULE_NAME_EFFECTIVE" \
            -c scheduleExpression="$SCHEDULE_EXPRESSION_EFFECTIVE" \
            -c scheduleTimezone="$SCHEDULE_TIMEZONE_EFFECTIVE" \
            -c syncEnabled="$SYNC_ENABLED_EFFECTIVE" \
            -c adminApiName="$ADMIN_API_NAME_EFFECTIVE" \
            -c adminFunctionName="$ADMIN_FUNCTION_NAME_EFFECTIVE" \
            -c budgetName="$BUDGET_NAME_EFFECTIVE" \
            -c budgetGuardFunctionName="$BUDGET_GUARD_FUNCTION_NAME_EFFECTIVE" \
            -c budgetGuardMonthlyScheduleName="$BUDGET_GUARD_MONTHLY_SCHEDULE_NAME_EFFECTIVE" \
            -c budgetGuardHourlyScheduleName="$BUDGET_GUARD_HOURLY_SCHEDULE_NAME_EFFECTIVE" \
            -c blApiTokenSsmParam="$BL_API_TOKEN_SSM_PARAM_EFFECTIVE" \
            -c blSyncStatusSsmParam="$BL_SYNC_STATUS_SSM_PARAM_EFFECTIVE" \
            -c blSyncConfigSsmParam="$BL_SYNC_CONFIG_SSM_PARAM_EFFECTIVE" \
            -c budgetFxRateSsmParam="$BUDGET_FX_RATE_SSM_PARAM_EFFECTIVE" \
            -c budgetGuardStatusSsmParam="$BUDGET_GUARD_STATUS_SSM_PARAM_EFFECTIVE" \
            -c blInventoryId="$BL_INVENTORY_ID" \
            -c blWarehouseId="$BL_WAREHOUSE_ID" \
            -c blApiMaxRpm="$BL_API_MAX_RPM_EFFECTIVE" \
            -c makePublicFeed="$MAKE_PUBLIC_FEED_EFFECTIVE" \
            -c adminUsername="$ADMIN_USERNAME" \
            -c adminPasswordHash="$ADMIN_PASSWORD_HASH" \
            -c brandName="$CLIENT_BRAND_NAME_EFFECTIVE" \
            -c brandPanelTitle="$CLIENT_PANEL_TITLE_EFFECTIVE" \
            -c brandPanelSubtitle="$CLIENT_PANEL_SUBTITLE_EFFECTIVE" \
            -c brandLocale="$CLIENT_LOCALE_EFFECTIVE" \
            -c brandPrimaryColor="$CLIENT_PRIMARY_COLOR_EFFECTIVE" \
            -c brandPrimaryDarkColor="$CLIENT_PRIMARY_DARK_COLOR_EFFECTIVE" \
            -c brandSecondaryColor="$CLIENT_SECONDARY_COLOR_EFFECTIVE" \
            -c brandLogoEnabled="$CLIENT_LOGO_ENABLED" \
            -c budgetAlertEmail="${BUDGET_ALERT_EMAIL:-}" \
            -c budgetLimitUsd="$BUDGET_LIMIT_USD_EFFECTIVE"
